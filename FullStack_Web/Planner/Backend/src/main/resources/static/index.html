<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlanWise - Login / Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
        }
        .login-container {
          background: white;
          padding: 40px;
          border-radius: 10px;
          box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
          width: 100%;
          max-width: 400px;
        }
        .logo {
          text-align: center;
          margin-bottom: 30px;
        }
        .logo h1 {
          color: #667eea;
          font-size: 32px;
          font-weight: 700;
        }
        .logo p {
          color: #666;
          font-size: 14px;
          margin-top: 5px;
        }
        .form-group {
          margin-bottom: 20px;
        }
        label {
          display: block;
          margin-bottom: 8px;
          color: #333;
          font-weight: 500;
          font-size: 14px;
        }
        input {
          width: 100%;
          padding: 12px;
          border: 2px solid #e1e1e1;
          border-radius: 5px;
          font-size: 14px;
          transition: border-color 0.3s;
        }
        input:focus {
          outline: none;
          border-color: #667eea;
        }
        .btn-login {
          width: 100%;
          padding: 12px;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
          border: none;
          border-radius: 5px;
          font-size: 16px;
          font-weight: 600;
          cursor: pointer;
          transition: transform 0.2s;
        }
        .btn-login:hover {
          transform: translateY(-2px);
        }
        .forgot-password,
        .switch-link {
          text-align: center;
          margin-top: 15px;
          color: #667eea;
          font-size: 14px;
          cursor: pointer;
        }
        .switch-link span {
          font-weight: 600;
          text-decoration: underline;
        }
        .error-message,
        .success-message {
          display: none;
          padding: 10px;
          border-radius: 5px;
          margin-bottom: 20px;
          font-size: 14px;
        }
        .error-message {
          background: #fee;
          color: #c33;
        }
        .success-message {
          background: #efe;
          color: #3c3;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <h1 id="formTitle">PlanWise Login</h1>
        <p>Plan Smarter, Achieve More</p>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="authForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email" />
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password" />
        </div>
        <button type="submit" class="btn-login" id="submitBtn">Log In</button>
    </form>

    <div class="switch-link" id="switchMode">
        Don’t have an account? <span>Sign Up</span>
    </div>
</div>

<script>
    const form = document.getElementById('authForm');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const formTitle = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const switchMode = document.getElementById('switchMode');

    let isLoginMode = true; // start in login mode

    switchMode.addEventListener('click', () => {
      isLoginMode = !isLoginMode;
      if (isLoginMode) {
        formTitle.textContent = "PlanWise Login";
        submitBtn.textContent = "Log In";
        switchMode.innerHTML = `Don’t have an account? <span>Sign Up</span>`;
      } else {
        formTitle.textContent = "PlanWise Sign Up";
        submitBtn.textContent = "Register";
        switchMode.innerHTML = `Already have an account? <span>Log In</span>`;
      }
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      const endpoint = isLoginMode
        ? "http://localhost:8080/api/auth/login"
        : "http://localhost:8080/api/auth/register";

      try {
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (response.ok) {
          successMessage.textContent = data.message || (isLoginMode ? "Login successful!" : "Registration successful!");
          successMessage.style.display = "block";

          if (isLoginMode && data.sessionToken) {
            localStorage.setItem("sessionToken", data.sessionToken);
            setTimeout(() => (window.location.href = "/dashboard.html"), 1200);
          }
        } else {
          errorMessage.textContent = data.error || (isLoginMode ? "Invalid credentials!" : "Registration failed!");
          errorMessage.style.display = "block";
        }
      } catch (err) {
        console.error("Fetch error:", err);
        errorMessage.textContent = "❌ Failed to connect to backend.";
        errorMessage.style.display = "block";
      }
    });
</script>
</body>
</html>
