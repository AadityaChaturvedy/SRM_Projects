<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medico | Real-Time Health Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩺</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="script.js" defer></script>
</head>
<body>

    <header class="dashboard-header">
        <h1>🩺 Medico Health Monitor</h1>
        <div class="controls">
            <button id="refresh-btn" class="control-btn" aria-label="Refresh Data">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
            </button>
            <button id="theme-toggle" class="control-btn" aria-label="Toggle Dark Mode">
                <svg class="sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
            <button id="alert-btn" class="control-btn" aria-label="Trigger Alert">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            </button>
        </div>
    </header>

    <main class="dashboard-grid">
        <div class="status-bar" id="status-bar">
            Connecting...
        </div>

        <article class="card monitor-card temp-card">
            <h2>Temperature</h2>
            <div class="reading">
                <span class="value" id="current-temp">--.-</span>
                <span class="unit">°C</span>
            </div>
            <p class="card-footer">Latest Reading</p>
        </article>

        <article class="card monitor-card hr-card">
            <h2>Heart Rate</h2>
            <div class="reading">
                <span id="hr-icon-wrapper" class="icon">❤️</span>
                <span class="value" id="current-hr">--</span>
                <span class="unit">BPM</span>
            </div>
            <p class="card-footer">Live Pulse</p>
        </article>

        <article class="card chart-card">
            <h2>Heart Rate History (Last 15)</h2>
            <div class="chart-container">
                <canvas id="hr-chart"></canvas>
            </div>
        </article>
        
        <article class="card log-card">
            <h2>Reading Log (Last 20)</h2>
            <div class="log-container">
                <ul id="reading-log">
                    <li class="log-item empty">Fetching data...</li>
                </ul>
            </div>
        </article>
    </main>

</body>
</html>
